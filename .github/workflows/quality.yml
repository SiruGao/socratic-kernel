name: Quality checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Static tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Install Chromium test runner
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Run browser interaction tests
        run: |
          python3 -m http.server 4173 --directory dist > /tmp/socratic-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              break
            fi
            sleep 1
          done
          node tests/e2e/navigation.mjs
          node tests/e2e/models.mjs
          node tests/e2e/session.mjs
          node tests/e2e/data-mobile.mjs
