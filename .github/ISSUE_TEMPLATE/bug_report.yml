name: Bug report
about: 报告可以复现的功能、界面、数据或部署问题
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢你帮助改进 Socratic Kernel。请不要在公开 Issue 中粘贴 API Key、访问令牌、私密审议正文或可利用的安全细节。
  - type: dropdown
    id: area
    attributes:
      label: 问题区域
      options:
        - 本地审议流程
        - 完成页、判断卡与导出
        - 模型中心 / Gateway
        - AI 追问
        - 思考档案与数据
        - PWA / 离线缓存
        - GitHub Pages / Vercel 部署
        - 视觉、动效与无障碍
        - 其他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 实际发生了什么？你原本期望什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 输入非敏感测试内容……
        4. 出现……
    validations:
      required: true
  - type: input
    id: deployment
    attributes:
      label: 部署方式
      placeholder: GitHub Pages / Vercel / vercel dev / 静态服务器
  - type: input
    id: browser
    attributes:
      label: 浏览器与设备
      placeholder: Safari 26.5 / macOS，Chrome / Android 等
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 截图、控制台信息或非敏感日志
      description: 请删除密钥、令牌、个人身份和私密审议内容。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同问题。
          required: true
        - label: 我确认没有提交 API Key、访问令牌或私密审议正文。
          required: true
