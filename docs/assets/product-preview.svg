<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Socratic Kernel product preview</title>
  <desc id="desc">A preview of the Socratic Kernel home interface.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e4ece3"/>
      <stop offset="0.48" stop-color="#f4f1e9"/>
      <stop offset="1" stop-color="#eee3ce"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#26352b" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="32" fill="#151a16"/>
  <rect x="34" y="34" width="1132" height="652" rx="22" fill="url(#page)" filter="url(#shadow)"/>
  <rect x="34" y="34" width="1132" height="52" rx="22" fill="#fffdf7"/>
  <rect x="34" y="64" width="1132" height="22" fill="#fffdf7"/>
  <circle cx="66" cy="60" r="7" fill="#cf786d"/>
  <circle cx="90" cy="60" r="7" fill="#d9b55f"/>
  <circle cx="114" cy="60" r="7" fill="#6ea27a"/>
  <rect x="184" y="48" width="748" height="24" rx="12" fill="#f0eee7"/>
  <text x="558" y="65" text-anchor="middle" fill="#72766d" font-family="Inter, Arial, sans-serif" font-size="11">sirugao.github.io/socratic-kernel</text>

  <g transform="translate(70 112)">
    <rect width="1060" height="58" rx="29" fill="#fffdf7" stroke="#d6d2c8"/>
    <circle cx="34" cy="29" r="18" fill="#171915"/>
    <text x="34" y="35" text-anchor="middle" fill="#fffdf7" font-family="Arial, sans-serif" font-size="16" font-weight="700">核</text>
    <text x="63" y="26" fill="#171915" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">内核</text>
    <text x="63" y="41" fill="#7b7f76" font-family="Inter, Arial, sans-serif" font-size="8">SOCRATIC KERNEL</text>
    <g fill="#747970" font-family="Inter, Arial, sans-serif" font-size="11">
      <text x="410" y="34">今日</text><text x="472" y="34">开始审议</text><text x="558" y="34">思考档案</text><text x="641" y="34">数据</text>
    </g>
    <rect x="932" y="14" width="108" height="30" rx="15" fill="#214732"/>
    <text x="986" y="33" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700">＋ 新审议</text>
  </g>

  <g transform="translate(70 190)">
    <rect width="704" height="286" rx="24" fill="#fffdf7" stroke="#d6d2c8"/>
    <text x="42" y="46" fill="#335d43" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2">SOCRATIC AUTONOMY PRACTICE</text>
    <text x="42" y="108" fill="#171915" font-family="Georgia, serif" font-size="43" font-weight="700">答案可以外包，</text>
    <text x="42" y="158" fill="#171915" font-family="Georgia, serif" font-size="43" font-weight="700">判断不能。</text>
    <text x="42" y="198" fill="#72766d" font-family="Inter, Arial, sans-serif" font-size="13">先写下你的立场，再让问题进入。</text>
    <text x="42" y="220" fill="#72766d" font-family="Inter, Arial, sans-serif" font-size="13">看见前提、证据、欲望与责任。</text>
    <rect x="42" y="241" width="128" height="34" rx="17" fill="#214732"/>
    <text x="106" y="262" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700">开始一次审议</text>
    <rect x="180" y="241" width="142" height="34" rx="17" fill="#fffdf7" stroke="#cbc7bd"/>
    <text x="251" y="262" text-anchor="middle" fill="#171915" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700">审计一次 AI 使用</text>
  </g>

  <g transform="translate(794 190)">
    <rect width="336" height="286" rx="24" fill="#fffdf7" stroke="#d6d2c8"/>
    <text x="28" y="45" fill="#335d43" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2">今天的提醒</text>
    <text x="28" y="100" fill="#171915" font-family="Georgia, serif" font-size="25">“你需要的是</text>
    <text x="28" y="138" fill="#171915" font-family="Georgia, serif" font-size="25">更多信息，</text>
    <text x="28" y="176" fill="#171915" font-family="Georgia, serif" font-size="25">还是有人替你</text>
    <text x="28" y="214" fill="#171915" font-family="Georgia, serif" font-size="25">承担选择？”</text>
    <rect x="28" y="240" width="132" height="26" rx="13" fill="#dfe9df"/>
    <text x="94" y="257" text-anchor="middle" fill="#214732" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">本地优先 · 无需登录</text>
  </g>

  <g transform="translate(70 500)">
    <text x="0" y="18" fill="#335d43" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" letter-spacing="2">PRACTICE SIGNALS</text>
    <text x="0" y="51" fill="#171915" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">练习信号</text>
    <g transform="translate(0 72)">
      <g><rect width="252" height="94" rx="16" fill="#fffdf7" stroke="#d6d2c8"/><text x="20" y="28" fill="#72766d" font-family="Inter, Arial, sans-serif" font-size="10">已完成审议</text><text x="20" y="67" fill="#171915" font-family="Georgia, serif" font-size="31" font-weight="700">12</text></g>
      <g transform="translate(269)"><rect width="252" height="94" rx="16" fill="#fffdf7" stroke="#d6d2c8"/><text x="20" y="28" fill="#72766d" font-family="Inter, Arial, sans-serif" font-size="10">平均练习完整度</text><text x="20" y="67" fill="#171915" font-family="Georgia, serif" font-size="31" font-weight="700">86</text></g>
      <g transform="translate(538)"><rect width="252" height="94" rx="16" fill="#fffdf7" stroke="#d6d2c8"/><text x="20" y="28" fill="#72766d" font-family="Inter, Arial, sans-serif" font-size="10">AI 使用审计</text><text x="20" y="67" fill="#171915" font-family="Georgia, serif" font-size="31" font-weight="700">7</text></g>
      <g transform="translate(807)"><rect width="253" height="94" rx="16" fill="#fffdf7" stroke="#d6d2c8"/><text x="20" y="28" fill="#72766d" font-family="Inter, Arial, sans-serif" font-size="10">重复线索</text><text x="20" y="64" fill="#214732" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">判断外包</text></g>
    </g>
  </g>
</svg>
